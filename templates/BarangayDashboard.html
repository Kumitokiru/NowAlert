<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Barangay {{ barangay }} Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        #map { height: 400px; width: 100%; }
        #alert-container { max-height: 300px; overflow-y: auto; border: 1px solid red; padding: 10px; }
        .alert-item { margin-bottom: 10px; padding: 10px; background-color: #f0f0f0; border-radius: 5px; color: #333; }
    </style>
</head>
<body>
    <div class="sidebar">
        <nav>
            <ul>
                <li><a href="{{ url_for('barangay_dashboard') }}"><span>🏠</span> Dashboard</a></li>
                <li><a href="#alerts"><span>🔔</span> Alerts</a></li>
                <li><a href="{{ url_for('logout') }}"><span>🚪</span> Log Out</a></li>
            </ul>
        </nav>
    </div>
    <div class="dashboard">
        <header>
            <h1>Barangay {{ barangay }} Dashboard</h1>
        </header>
        <main>
            <section class="map-section">
                <h2>Live Image Map Location</h2>
                <div id="map"></div>
            </section>
            <section class="alerts" id="alerts">
                <h2>Live Alerts</h2>
                <div id="alert-container"></div>
            </section>
        </main>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const lat = {{ lat_coord|default(14.5995) }};
            const lon = {{ lon_coord|default(120.9842) }};
            const barangayMap = L.map('map').setView([lat, lon], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors'
            }).addTo(barangayMap);

            const socket = io('http://localhost:5000'); // Update to production URL
            const alertElements = new Map(); // Store alert elements by ID

            socket.on('connect', () => console.log('Connected to SocketIO server'));

            socket.on('new_alert', (data) => {
                console.log('Alert received:', data);
                const dashboardBarangay = "{{ barangay }}";
                const alertBarangay = data.user_barangay || 'Unknown';
                const message = `Emergency at ${dashboardBarangay}, from ${alertBarangay}`;

                // Add to Live Alerts
                const feed = document.getElementById('alert-container');
                const alertDiv = document.createElement('div');
                alertDiv.className = 'alert-item';
                alertDiv.dataset.alertId = data.alert_id;
                alertDiv.innerHTML = `
                    <p>${message}</p>
                    ${data.image ? `<img src="data:image/jpeg;base64,${data.image}" width="200"/>` : ''}
                `;
                feed.prepend(alertDiv);
                alertElements.set(data.alert_id, alertDiv);

                // Add to Map
                if (data.lat && data.lon) {
                    L.marker([data.lat, data.lon]).addTo(barangayMap)
                        .bindPopup(message)
                        .openPopup();
                }
            });

            socket.on('alert_removed', (data) => {
                const alertId = data.alert_id;
                const alertDiv = alertElements.get(alertId);
                if (alertDiv) {
                    alertDiv.remove();
                    alertElements.delete(alertId);
                    console.log(`Alert ${alertId} removed from UI`);
                }
            });
        });
    </script>
</body>
</html>
